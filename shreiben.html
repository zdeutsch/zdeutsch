  <body class="theme-body shreiben-page font-body min-h-screen">
    <div class="fixed inset-0">
      <div class="absolute inset-0 flag-glow-top"></div>
      <div class="absolute inset-0 flag-glow-bottom"></div>
      <div class="absolute inset-0 grid-overlay"></div>
    </div>

    <header class="fixed top-0 left-0 right-0 h-16 border-b border-black/10 bg-white/90 backdrop-blur-md shadow-sm z-40">
      <div class="w-full h-full px-3 sm:px-6 flex items-center justify-between gap-3 sm:gap-4">
        <div id="header-left" class="flex items-center gap-3 shrink-0">
          <button id="return-btn" class="h-9 w-9 rounded-xl border border-black/10 bg-white/80 text-slate flex items-center justify-center shadow-sm">
            <i data-lucide="arrow-left" class="h-4 w-4" aria-hidden="true"></i>
          </button>
          <span id="return-label" class="text-xs font-display uppercase tracking-[0.2em] text-slate">Return</span>
          <div id="header-divider" class="h-6 w-px bg-black/10"></div>
          <div id="header-title">
            <div class="flex items-center gap-2">
              <h1 id="theme-title" class="font-display text-base">Shreiben</h1>
              <span id="level-pill" class="rounded-full border border-azure/40 bg-azure/10 px-2 py-0.5 text-[10px] uppercase tracking-[0.2em] text-azure font-display">B2</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <div id="timer-display" class="hidden items-center gap-2 rounded-full border border-azure/40 bg-azure/10 px-3 py-1 text-[10px] font-display uppercase tracking-[0.2em] text-azure">
            <span id="timer-value">30:00</span>
          </div>
          <button id="settings-btn" class="h-9 w-9 rounded-xl border border-black/10 bg-white/80 text-slate flex items-center justify-center shadow-sm hover:bg-white transition-colors">
            <i data-lucide="settings" class="h-4 w-4" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </header>

    <div id="settings-panel" class="fixed right-3 sm:right-6 top-20 w-[calc(100vw-1.5rem)] max-w-64 rounded-2xl border border-stone-300 bg-white/95 shadow-panel p-4 hidden z-40">
      <div class="text-xs uppercase tracking-[0.2em] text-slate font-display">Editor Settings</div>
      <div class="mt-4">
        <div class="flex items-center justify-between text-xs text-slate font-display uppercase tracking-[0.2em]">
          <span>Font size</span>
          <span id="font-size-value">16px</span>
        </div>
        <input id="font-size-input" type="range" min="14" max="24" step="1" value="16" class="mt-3 w-full">
      </div>
      <div class="mt-4 border-t border-stone-200 pt-4">
        <label class="flex items-center justify-between text-xs text-slate font-display uppercase tracking-[0.2em]">
          <span>Timer</span>
          <input id="timer-toggle" type="checkbox" class="h-4 w-4">
        </label>
        <p id="timer-copy" class="mt-2 text-[10px] text-slate">30 min countdown for writing.</p>
      </div>
    </div>

    <main class="relative z-10 w-full px-2 pt-20 pb-6 sm:px-6 sm:pt-24 sm:pb-12 lg:px-8">
      <div class="rounded-[1.75rem] border border-stone-300 bg-white/90 shadow-panel p-3 sm:p-6">
        <div class="text-xs uppercase tracking-[0.3em] text-slate font-display">Shreiben</div>
        <h2 class="mt-2 text-2xl font-display text-ink">Schreibaufgaben</h2>
        <p class="mt-2 text-sm text-slate">Lesen Sie die Anzeige, bearbeiten Sie die Leitpunkte und schreiben Sie Ihre Beschwerde.</p>

        <div id="part-cards" class="mt-4 sm:mt-5 flex flex-wrap items-center gap-2"></div>
        <section id="shreiben-content" class="mt-4 sm:mt-6 space-y-4 sm:space-y-6"></section>
      </div>
    </main>
